<!DOCTYPE html>
<html>
<head>
  <title>Contact - WEBIFY DIGITAL SOLUTIONS</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#020617;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .box{
      width:90%;
      max-width:700px;
      padding:40px;
      border-radius:30px;
      background:rgba(0,0,0,.4);
      border:1px solid rgba(255,255,255,.2);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    input,textarea{
      width:100%;
      padding:18px;
      margin-bottom:20px;
      border:none;
      border-radius:14px;
      background:#111827;
      color:white;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:linear-gradient(90deg,#0066ff,#ff00aa);
      color:white;
      font-size:18px;
      font-weight:700;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Contact WEBIFY DIGITAL SOLUTIONS</h1>

  <form action="https://formsubmit.co/webifydigitalsolutions.com@gmail.com" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="message" rows="6" placeholder="Your Message"></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>

</body>
</html>
